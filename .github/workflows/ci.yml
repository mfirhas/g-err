name: ci

env:
  RUST_VERSION: 1.95.0
  CACHE_NAME: ${{ github.repository }}-cache

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.repository }}-ci
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog Leaks Scan
        uses: trufflesecurity/trufflehog@v3.91.2
        with:
          extra_args: --only-verified

      - name: Cache run data
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ env.RUST_VERSION }}
          override: true

      - name: Install clippy
        if: steps.cache.outputs.cache-hit != 'true'
        run: rustup component add clippy

      - name: Run checks
        run: make check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6

      - name: Cache run data
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_NAME }}-

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ env.RUST_VERSION }}
          override: true

      - name: Run tests
        run: make test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6

      - name: Cache run data
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_NAME }}-

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ env.RUST_VERSION }}
          override: true

      - name: Install cargo-llvm-cov
        if: steps.cache.outputs.cache-hit != 'true'
        run: which cargo-llvm-cov || cargo install cargo-llvm-cov --locked

      - name: Generate lcov
        run: make lcov

      - name: Debug LCOV
        run: |
          ls -lh target/coverage
          head -20 target/coverage/lcov.info
          lcov --summary target/coverage/lcov.info

      - name: Check coverage
        run: make coverage-check

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-info
          path: target/coverage/lcov.info
          if-no-files-found: error
  
  upload-coverage:
    name: Upload coverage
    runs-on: ubuntu-latest
    needs: coverage
    permissions:
      contents: read
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6

      - name: Download lcov artifact
        uses: actions/download-artifact@v4
        with:
          name: lcov-info
          path: target/coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./target/coverage/lcov.info
          fail_ci_if_error: true
