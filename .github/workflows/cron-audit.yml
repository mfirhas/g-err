name: cron-audit

env:
  RUST_VERSION: 1.95.0

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: "0 0 * * 1"

concurrency:
  group: ${{ github.repository }}-cron-audit
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check bi-weekly schedule
        id: schedule
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          week=$(date +%V)

          if (( week % 2 == 0 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.schedule.outputs.run == 'true'
        uses: actions/checkout@v6

      - name: Install stable Rust
        if: steps.schedule.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-audit
        if: steps.schedule.outputs.run == 'true'
        run: cargo install --locked cargo-audit

      - name: Run cargo audit
        if: steps.schedule.outputs.run == 'true'
        shell: bash
        run: |
          set +e

          cargo audit --format json > audit.json
          status=$?

          tmp=$(mktemp)
          jq . audit.json > "$tmp" && mv "$tmp" audit.json

          vulnerabilities=$(jq -r '.vulnerabilities.found' audit.json)

          warnings=$(
            jq '
              .warnings
              | to_entries
              | map(.value | length)
              | add // 0
            ' audit.json
          )

          if [ "$vulnerabilities" = "true" ]; then
            if [ "$warnings" -gt 0 ]; then
              result="❌ FAIL"
              message="vulnerabilities and warnings found"
            else
              result="❌ FAIL"
              message="vulnerabilities found"
            fi
          elif [ "$warnings" -gt 0 ]; then
            result="⚠️ WARNINGS"
            message="warnings found"
          else
            result="✅ PASS"
            message="no vulnerabilities or warnings found"
          fi

          {
            echo "STATUS=$status"
            echo "RESULT=$result"
            echo "MESSAGE=$message"
          } >> "$GITHUB_ENV"

      - name: Generate AUDIT.md
        if: steps.schedule.outputs.run == 'true'
        shell: bash
        run: |
          cat > AUDIT.md <<EOF
          # Security Audit

          > [!NOTE]
          > This file is automatically generated by GitHub Actions.
          > Do not edit it manually.

          - Last Checked (UTC): $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - Tool: cargo-audit
          - Command status: exit code $STATUS
          - Audit status: $RESULT — $MESSAGE

          ## Result

          \`\`\`json
          $(cat audit.json)
          \`\`\`
          EOF

      - name: Commit changes
        if: steps.schedule.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add AUDIT.md

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "cron-audit: $RESULT — $MESSAGE"
          git push
          rm -f audit.json
